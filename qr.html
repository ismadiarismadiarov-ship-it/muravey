<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭлМОТО QR | Тез кирүү</title>
    <meta name="description" content="ЭлМОТО сайтына QR код менен тез кирүү барагы.">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/jpeg" href="assets/emoto-logo.jpeg">
    <link rel="apple-touch-icon" href="assets/emoto-logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-grid">
            <div class="brand">
                <img src="assets/emoto-logo.jpeg" alt="ЭлМОТО эмблемасы" class="brand-emblem">
                <div class="brand-text">
                    <span class="logo">ЭлМОТО</span>
                    <span class="logo-accent">QR баракча</span>
                </div>
            </div>
            <div></div>
            <div class="header-actions">
                <a href="index.html" class="qr-top-link">Башкы бет</a>
            </div>
        </div>
    </header>

    <main class="container qr-page">
        <section class="banner qr-hero">
            <div>
                <h1>QR менен тез кирүү</h1>
                <p>Телефон камерасы менен сканерлеп, ЭлМОТО сайтына дароо өтүңүз.</p>
            </div>
        </section>

        <section class="qr-card">
            <div id="qr-code" class="qr-container" aria-live="polite"></div>
            <p id="qr-url" class="qr-url"></p>
            <a href="index.html" class="checkout-btn qr-home-btn">Башкы бетке кайтуу</a>
        </section>
    </main>

    <script>
        (function renderQrPage() {
            const PUBLIC_HOME_URL = 'https://ismadiarismadiarov-ship-it.github.io/muravey/';
            const LOCAL_HOSTS = new Set(['localhost', '127.0.0.1']);
            const isLocal = LOCAL_HOSTS.has(window.location.hostname);
            const homeUrl = isLocal ? PUBLIC_HOME_URL : new URL('./', window.location.href).href;
            const qrCode = document.getElementById('qr-code');
            const qrText = document.getElementById('qr-url');
            const encodedUrl = encodeURIComponent(homeUrl);
            const qrProviders = [
                `https://quickchart.io/qr?size=320&margin=2&text=${encodedUrl}`,
                `https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=24&data=${encodedUrl}`
            ];

            let providerIndex = 0;
            const qrImage = new Image(220, 220);
            qrImage.alt = 'ЭлМОТО QR коду';

            qrImage.onerror = function handleQrError() {
                providerIndex += 1;
                if (providerIndex < qrProviders.length) {
                    qrImage.src = qrProviders[providerIndex];
                    return;
                }
                qrCode.innerHTML = '<p style="color:#9e9e9e;text-align:center;">QR жүктөлбөй калды. Төмөнкү шилтеме менен кириңиз.</p>';
            };

            qrImage.src = qrProviders[providerIndex];
            qrCode.innerHTML = '';
            qrCode.appendChild(qrImage);
            qrText.textContent = homeUrl;
        }());
    </script>
</body>
</html>
